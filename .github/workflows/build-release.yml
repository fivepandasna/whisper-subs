name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.sln'
      - '.github/workflows/build-release.yml'
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build whisper.cpp static binaries ──────────────────────────────
  build-whisper:
    needs: [check-version]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            variant: cpu
            asset_name: whisper-cli-linux-x64
            cmake_flags: "-DGGML_NATIVE=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_BMI2=ON"
            pre_install: ""
          - os: ubuntu-24.04
            variant: cpu-noavx
            asset_name: whisper-cli-linux-x64-noavx
            cmake_flags: "-DGGML_NATIVE=OFF -DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_BMI2=OFF -DGGML_SSE42=ON -DGGML_OPENMP=OFF"
            pre_install: ""
          - os: ubuntu-24.04-arm
            variant: cpu
            asset_name: whisper-cli-linux-arm64
            cmake_flags: ""
            pre_install: ""
          - os: ubuntu-24.04
            variant: cuda12
            asset_name: whisper-cli-linux-x64-cuda12
            cmake_flags: "-DGGML_CUDA=ON"
            pre_install: "cuda"
          - os: ubuntu-24.04
            variant: vulkan
            asset_name: whisper-cli-linux-x64-vulkan
            cmake_flags: "-DGGML_VULKAN=ON"
            pre_install: "vulkan"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Cache whisper binary
        id: cache-whisper
        uses: actions/cache@v4
        with:
          path: /tmp/whisper-${{ matrix.variant }}/build/bin/whisper-cli
          key: whisper-1.8.4-${{ matrix.asset_name }}-v5

      - name: Install build dependencies
        if: steps.cache-whisper.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ make

      - name: Install CUDA Toolkit
        if: steps.cache-whisper.outputs.cache-hit != 'true' && matrix.pre_install == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev"]'

      - name: Install cuBLAS
        if: steps.cache-whisper.outputs.cache-hit != 'true' && matrix.pre_install == 'cuda'
        run: sudo apt-get install -y libcublas-dev-12-6

      - name: Install Vulkan SDK
        if: steps.cache-whisper.outputs.cache-hit != 'true' && matrix.pre_install == 'vulkan'
        run: sudo apt-get install -y libvulkan-dev glslc

      - name: Clone whisper.cpp
        if: steps.cache-whisper.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch v1.8.4 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper-${{ matrix.variant }}

      - name: Build whisper-cli
        if: steps.cache-whisper.outputs.cache-hit != 'true'
        run: |
          cd /tmp/whisper-${{ matrix.variant }}
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
            ${{ matrix.cmake_flags }}
          cmake --build build --config Release -j$(nproc)

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: /tmp/whisper-${{ matrix.variant }}/build/bin/whisper-cli

  # ── Build whisper.cpp ROCm binary (needs full SDK container) ───────
  # NOTE: Cannot use `container:` with self-hosted runners — JavaScript actions
  # (cache, upload-artifact) fail because Node.js isn't mapped into the container.
  # Instead, run the ROCm build via `docker run` so actions execute natively.
  build-whisper-rocm:
    needs: [check-version]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Cache whisper ROCm binary
        id: cache-whisper-rocm
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/rocm-output/whisper-cli
          key: whisper-1.8.4-rocm-6.1.2-v2

      - name: Build whisper-cli with ROCm
        if: steps.cache-whisper-rocm.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/rocm-output"
          docker run --rm \
            -v "$GITHUB_WORKSPACE/rocm-output":/output \
            rocm/dev-ubuntu-22.04:6.1.2 \
            bash -c '
              apt-get update && apt-get install -y cmake g++ make git rocblas-dev hipblas-dev &&
              git clone --depth 1 --branch v1.8.4 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper &&
              cd /tmp/whisper &&
              cmake -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
                -DGGML_HIP=ON \
                -DCMAKE_C_COMPILER=hipcc \
                -DCMAKE_CXX_COMPILER=hipcc &&
              cmake --build build --config Release -j$(nproc) &&
              cp build/bin/whisper-cli /output/
            '

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-cli-linux-x64-rocm
          path: ${{ github.workspace }}/rocm-output/whisper-cli

  # ── Check if release already exists ─────────────────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version and check tag
        id: check
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' WhisperSubs.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "::notice::Tag v${VERSION} already exists — skipping release"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── Build plugin + create release ──────────────────────────────────
  build:
    needs: [build-whisper, build-whisper-rocm, check-version]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test WhisperSubs.Tests/WhisperSubs.Tests.csproj --configuration Release --no-restore --verbosity normal

      - name: Get version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' WhisperSubs.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create plugin package
        run: |
          mkdir -p release
          cp bin/Release/net9.0/WhisperSubs.dll release/
          cp bin/Release/net9.0/WhisperSubs.pdb release/ 2>/dev/null || true
          cd release && zip -r ../WhisperSubs_${{ steps.version.outputs.version }}.zip .

      - name: Calculate checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum WhisperSubs_${{ steps.version.outputs.version }}.zip | cut -d ' ' -f 1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Download whisper binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: whisper-binaries

      - name: Prepare whisper binaries for release
        run: |
          for dir in whisper-binaries/whisper-cli-*; do
            platform=$(basename "$dir")
            cp "$dir/whisper-cli" "./${platform}"
            chmod +x "./${platform}"
          done
          ls -la whisper-cli-*

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHECKSUM="${{ steps.checksum.outputs.checksum }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > manifest.json << EOF
          [
            {
              "guid": "e05cda95-8ac3-47c9-9503-5048cab3b9ee",
              "name": "WhisperDubSubs",
              "description": "Automated dubtitle generation for Jellyfin using local Whisper AI models.",
              "overview": "Generate dubtitles for your media library using local speech-to-text AI (whisper.cpp). Supports CPU and GPU-accelerated transcription. All processing happens locally on your server.",
              "owner": "fivepandasna",
              "category": "Subtitles",
              "versions": [
                {
                  "version": "${VERSION}",
                  "changelog": "See https://github.com/fivepandasna/whisper-dub-subs/releases",
                  "targetAbi": "10.11.0.0",
                  "sourceUrl": "https://github.com/fivepandasna/whisper-dub-subs/releases/download/v${VERSION}/WhisperSubs_${VERSION}.zip",
                  "checksum": "${CHECKSUM}",
                  "timestamp": "${TIMESTAMP}"
                }
              ]
            }
          ]
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: WhisperSubs v${{ steps.version.outputs.version }}
          files: |
            WhisperSubs_${{ steps.version.outputs.version }}.zip
            whisper-cli-linux-x64
            whisper-cli-linux-x64-noavx
            whisper-cli-linux-arm64
            whisper-cli-linux-x64-cuda12
            whisper-cli-linux-x64-vulkan
            whisper-cli-linux-x64-rocm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
